# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: github:ifiokjr/nixpkgs
  rust-overlay:
    url: github:oxalica/rust-overlay
    overlays:
      - default
allow_unfree: true
